services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lps-frontend
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/var/www
      - frontend_vendor:/var/www/vendor
      - frontend_storage:/var/www/storage
      - frontend_bootstrap:/var/www/bootstrap/cache
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
      menu-service:
        condition: service_started
      reservation-service:
        condition: service_started
      cart-service:
        condition: service_started

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: lps-auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./auth-service:/var/www
      - auth_vendor:/var/www/vendor
      - auth_storage:/var/www/storage
      - auth_bootstrap:/var/www/bootstrap/cache
    environment:
      DB_HOST: mysql
      DB_DATABASE: db_auth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  menu-service:
    build:
      context: ./menu-service
      dockerfile: Dockerfile
    container_name: lps-menu-service
    ports:
      - "8002:8000"
    volumes:
      - ./menu-service:/var/www
      - ./frontend/public/images:/var/www/public/images
      - menu_vendor:/var/www/vendor
      - menu_storage:/var/www/storage
      - menu_bootstrap:/var/www/bootstrap/cache
    environment:
      DB_HOST: mysql
      DB_DATABASE: db_menu
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  reservation-service:
    build:
      context: ./reservation-service
      dockerfile: Dockerfile
    container_name: lps-reservation-service
    ports:
      - "8003:8000"
    volumes:
      - ./reservation-service:/var/www
      - reservation_vendor:/var/www/vendor
      - reservation_storage:/var/www/storage
      - reservation_bootstrap:/var/www/bootstrap/cache
    environment:
      DB_HOST: mysql
      DB_DATABASE: db_reservation
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: lps-cart-service
    ports:
      - "8004:8000"
    volumes:
      - ./cart-service:/var/www
      - cart_vendor:/var/www/vendor
      - cart_storage:/var/www/storage
      - cart_bootstrap:/var/www/bootstrap/cache
    environment:
      DB_HOST: mysql
      DB_DATABASE: db_cart
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  special-table-service:
    build:
      context: ./special-table-service
      dockerfile: Dockerfile
    container_name: lps-special-table-service
    ports:
      - "8005:8000"
    volumes:
      - ./special-table-service:/var/www
      - special_vendor:/var/www/vendor
      - special_storage:/var/www/storage
      - special_bootstrap:/var/www/bootstrap/cache
    environment:
      DB_HOST: mysql
      DB_DATABASE: db_special
      SERVICE_TOKEN: kerapu-special-table-secret-2026
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: lps-mysql
    environment:
      MYSQL_DATABASE: db_auth
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lps-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  
  frontend_vendor:
  frontend_storage:
  frontend_bootstrap:

  auth_vendor:
  auth_storage:
  auth_bootstrap:

  menu_vendor:
  menu_storage:
  menu_bootstrap:

  reservation_vendor:
  reservation_storage:
  reservation_bootstrap:

  cart_vendor:
  cart_storage:
  cart_bootstrap:

  special_vendor:
  special_storage:
  special_bootstrap:
